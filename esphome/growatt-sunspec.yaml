# Growatt Inverter to SunSpec Bridge
# Reads real data from Growatt inverter via Modbus RTU (RS485)
# Exposes it via SunSpec-compliant Modbus TCP for Victron GX
# Also publishes all values to Home Assistant
#
# Hardware: LilyGo T-CAN485 ESP32 board
# Connection: RS485 to Growatt inverter COM port

substitutions:
  device_name: growatt-sunspec
  friendly_name: Growatt SunSpec Bridge
  manufacturer: "Growatt"
  model: "9000 TL3-S"
  serial: "GROWATT001"
  version: "1.0.0"
  max_power: "9000"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: INFO

# Enable Home Assistant API
api:
  encryption:
    key: !secret esphome_api_key

ota:
  password: !secret esphome_ota_password
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: !secret esphome_ap_ssid
    password: !secret esphome_ap_password

time:
  - platform: homeassistant

captive_portal:

web_server:
  port: 80
  version: 3
  sorting_groups:
    - id: group_ac
      name: "AC Output"
      sorting_weight: 1
    - id: group_dc
      name: "DC Input (PV)"
      sorting_weight: 2
    - id: group_control
      name: "Control"
      sorting_weight: 3
    - id: group_device
      name: "Device"
      sorting_weight: 4

# LilyGo T-CAN485 RS485 chip enable pins
output:
  - platform: gpio
    id: ENABLE_PIN
    pin:
      number: GPIO19
      inverted: true
  - platform: gpio
    id: SE_PIN
    pin:
      number: GPIO17
      inverted: true
  - platform: gpio
    id: ENABLE_5V_PIN
    pin:
      number: GPIO16
      inverted: true

# UART for RS485 communication with Growatt
uart:
  id: uart_growatt
  rx_pin: GPIO21
  tx_pin: GPIO22
  baud_rate: 9600
  parity: NONE
  stop_bits: 1

# Modbus RTU client (used by growatt_solar)
modbus:
  id: modbus_growatt
  uart_id: uart_growatt
  send_wait_time: 1000ms

# Modbus controller for Growatt inverter (write-only, for power control)
modbus_controller:
  id: growatt_controller
  modbus_id: modbus_growatt
  address: 1
  setup_priority: -10
  update_interval: never
  command_throttle: 500ms

# External component from GitHub
external_components:
  - source:
      type: git
      url: https://github.com/mahoekst/SunspecModbusServer
      ref: main
      path: esphome/components
    components: [ sunspec_modbus_server ]


# Growatt sensors via growatt_solar platform (handles correct register mapping)
sensor:
  - platform: growatt_solar
    protocol_version: RTU
    update_interval: 10s

    phase_a:
      voltage:
        id: growatt_voltage_a
        name: "Growatt Voltage Phase A"
        filters:
          - multiply: 0.57735  # Convert line-to-line (~400V) to phase-to-neutral (~230V)
        web_server:
          sorting_group_id: group_ac
          sorting_weight: 2
      current:
        id: growatt_current_a
        name: "Growatt Current Phase A"
        web_server:
          sorting_group_id: group_ac
          sorting_weight: 5
    phase_b:
      voltage:
        id: growatt_voltage_b
        name: "Growatt Voltage Phase B"
        filters:
          - multiply: 0.57735
        web_server:
          sorting_group_id: group_ac
          sorting_weight: 3
      current:
        id: growatt_current_b
        name: "Growatt Current Phase B"
        web_server:
          sorting_group_id: group_ac
          sorting_weight: 6
    phase_c:
      voltage:
        id: growatt_voltage_c
        name: "Growatt Voltage Phase C"
        filters:
          - multiply: 0.57735
        web_server:
          sorting_group_id: group_ac
          sorting_weight: 4
      current:
        id: growatt_current_c
        name: "Growatt Current Phase C"
        web_server:
          sorting_group_id: group_ac
          sorting_weight: 7

    pv1:
      voltage:
        id: growatt_dc_voltage
        name: "Growatt PV1 Voltage"
        web_server:
          sorting_group_id: group_dc
          sorting_weight: 1
      current:
        id: growatt_dc_current
        name: "Growatt PV1 Current"
        web_server:
          sorting_group_id: group_dc
          sorting_weight: 2
      active_power:
        id: growatt_dc_power
        name: "Growatt PV1 Power"
        web_server:
          sorting_group_id: group_dc
          sorting_weight: 3

    pv2:
      voltage:
        id: growatt_pv2_voltage
        name: "Growatt PV2 Voltage"
        web_server:
          sorting_group_id: group_dc
          sorting_weight: 4
      current:
        id: growatt_pv2_current
        name: "Growatt PV2 Current"
        web_server:
          sorting_group_id: group_dc
          sorting_weight: 5
      active_power:
        id: growatt_pv2_power
        name: "Growatt PV2 Power"
        web_server:
          sorting_group_id: group_dc
          sorting_weight: 6

    active_power:
      id: growatt_ac_power
      name: "Growatt AC Power"
      web_server:
        sorting_group_id: group_ac
        sorting_weight: 1

    frequency:
      id: growatt_frequency
      name: "Growatt Frequency"
      web_server:
        sorting_group_id: group_ac
        sorting_weight: 8

    total_energy_production:
      id: growatt_total_energy
      name: "Growatt Total Energy"
      unit_of_measurement: "Wh"
      device_class: energy
      state_class: total_increasing
      filters:
        - multiply: 1000  # Convert kWh to Wh
      web_server:
        sorting_group_id: group_ac
        sorting_weight: 9

    inverter_module_temp:
      id: growatt_temperature
      name: "Growatt Temperature"
      web_server:
        sorting_group_id: group_ac
        sorting_weight: 10

  # Diagnostics
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s
    web_server:
      sorting_group_id: group_device
      sorting_weight: 2

  - platform: uptime
    name: "${friendly_name} Uptime"
    update_interval: 60s
    web_server:
      sorting_group_id: group_device
      sorting_weight: 1

# SunSpec Modbus TCP Server - exposes Growatt data to Victron
sunspec_modbus_server:
  id: sunspec
  port: 502
  unit_id: 126
  manufacturer: ${manufacturer}
  model: ${model}
  serial: ${serial}
  version: ${version}
  max_power: ${max_power}
  update_interval: 1s

  # Source sensors from Growatt
  source_ac_power: growatt_ac_power
  source_voltage_a: growatt_voltage_a
  source_voltage_b: growatt_voltage_b
  source_voltage_c: growatt_voltage_c
  source_current_a: growatt_current_a
  source_current_b: growatt_current_b
  source_current_c: growatt_current_c
  source_frequency: growatt_frequency
  source_total_energy: growatt_total_energy
  source_dc_voltage: growatt_dc_voltage
  source_dc_current: growatt_dc_current
  source_dc_power: growatt_dc_power
  source_temperature: growatt_temperature
  source_pv2_voltage: growatt_pv2_voltage
  source_pv2_current: growatt_pv2_current
  source_pv2_power: growatt_pv2_power
  target_power_limit: growatt_power_rate

number:
  - platform: modbus_controller
    modbus_controller_id: growatt_controller
    id: growatt_power_rate
    name: "Growatt Active Power Rate"
    register_type: holding
    address: 3
    value_type: U_WORD
    min_value: 0
    max_value: 100
    step: 1
    unit_of_measurement: "%"
    multiply: 1
    entity_category: config
    icon: mdi:gauge
    mode: SLIDER
    web_server:
      sorting_group_id: group_control
      sorting_weight: 1

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"
      web_server:
        sorting_group_id: group_device
        sorting_weight: 3
  - platform: template
    name: "${friendly_name} Build Time"
    lambda: return {__DATE__ " " __TIME__};
    update_interval: 1h
    entity_category: diagnostic
    icon: mdi:clock-outline
    web_server:
      sorting_group_id: group_device
      sorting_weight: 4

button:
  - platform: restart
    name: "${friendly_name} Restart"
    web_server:
      sorting_group_id: group_device
      sorting_weight: 5
